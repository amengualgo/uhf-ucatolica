location /udlv-staff/ {
    set $backend "http://koha_app:8080";

    proxy_pass $backend/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;

    # Reescribir redirects HTTP (302) que genera Apache/Koha
    proxy_redirect / /udlv-staff/;
    proxy_redirect http://koha_app:8080/ /udlv-staff/;

    # Reescribir URLs absolutas en respuestas HTML/JS/CSS
    sub_filter_once off;
    sub_filter_types text/html text/css application/javascript text/javascript;
    sub_filter 'href="/'       'href="/udlv-staff/';
    sub_filter "href='/"       "href='/udlv-staff/";
    sub_filter 'src="/'        'src="/udlv-staff/';
    sub_filter "src='/"        "src='/udlv-staff/";
    sub_filter 'action="/'     'action="/udlv-staff/';
    sub_filter "action='/"     "action='/udlv-staff/";
    sub_filter '"/cgi-bin/'    '"/udlv-staff/cgi-bin/';
    sub_filter "'/cgi-bin/"    "'/udlv-staff/cgi-bin/";
    sub_filter '"/api/'        '"/udlv-staff/api/';
    sub_filter "'/api/"        "'/udlv-staff/api/";
    sub_filter '"/koha-tmpl/'  '"/udlv-staff/koha-tmpl/';
    sub_filter "'/koha-tmpl/"  "'/udlv-staff/koha-tmpl/";
}

